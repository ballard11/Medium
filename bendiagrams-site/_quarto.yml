project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!GETTING-STARTED.md"
    - "!MIGRATION.md"
    - "!README.md"
    - "!SETUP.md"

website:
  title: "BenDiagrams"
  description: "A data science lab for sports analytics, economic trends, and code experiments"
  site-url: "https://bendiagrams.com"
  repo-url: "https://github.com/ballard11/Medium"
  repo-actions: [edit, issue]

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Sports & Odds"
        href: sports/index.qmd
      - text: "Economics"
        href: economics/index.qmd
      - text: "Code & Labs"
        href: code/index.qmd
      - text: "The Toolbox"
        href: toolbox/index.qmd
    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: "https://github.com/ballard11"
      - icon: linkedin
        href: "https://www.linkedin.com/in/ben-ballard/"

  page-footer:
    background: light
    left: "© 2026 BenDiagrams. All rights reserved."
    right:
      - icon: envelope
        href: "#newsletter"
        text: "Newsletter"
      - icon: rss
        href: "index.xml"
        text: "RSS"

  comments:
    utterances:
      repo: ballard11/Medium
      issue-term: pathname
      theme: github-light

format:
  html:
    theme:
      light: [cosmo, custom.scss]  # You can create custom.scss for brand colors
      dark: [cosmo, custom.scss]
    css: styles.css
    highlight-style: github
    mainfont: "Lato"
    monofont: "Fira Mono"
    toc: true
    toc-depth: 3
    toc-location: left
    code-copy: true
    code-overflow: wrap
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    link-external-newwindow: true

    # SEO and Social Sharing
    open-graph: true

    # Analytics (add your measurement ID when ready)
    # google-analytics: "G-XXXXXXXXXX"  # Uncomment and add GA4 measurement ID when ready

execute:
  freeze: auto  # Only re-render changed files
  cache: false  # Disable cache to avoid jupyter-cache dependency in GitHub Actions
